<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <radialGradient id="bg" cx="50%" cy="42%" r="65%">
      <stop offset="0%" stop-color="#1c2738"/>
      <stop offset="100%" stop-color="#0f1115"/>
    </radialGradient>
  </defs>
  <rect width="512" height="512" rx="96" fill="url(#bg)"/>
  <!-- concentric rings -->
  <g fill="none" stroke="#7cc4ff" stroke-opacity="0.55">
    <circle cx="256" cy="256" r="170" stroke-width="8"/>
    <circle cx="256" cy="256" r="120" stroke-width="8"/>
    <circle cx="256" cy="256" r="70"  stroke-width="8"/>
  </g>
  <!-- cross hair -->
  <g stroke="#7cc4ff" stroke-width="6" stroke-linecap="round">
    <line x1="256" y1="60"  x2="256" y2="130"/>
    <line x1="256" y1="382" x2="256" y2="452"/>
    <line x1="60"  y1="256" x2="130" y2="256"/>
    <line x1="382" y1="256" x2="452" y2="256"/>
  </g>
  <!-- impact dot -->
  <circle cx="290" cy="232" r="16" fill="#5dd39e"/>
</svg>
